name: Outputs practice
on:
  push:
    branches: [main]
jobs:
  job1:
    runs-on: ubuntu-latest
    outputs:
      output1: ${{ steps.step-1.outputs.test }}
      output2: ${{ steps.step-2.outputs.test }}
    steps:
      - id: step-1
        run: echo "test=Hello" >> "$GITHUB_OUTPUT"
      - id: step-2
        run: echo "test=World" >> "$GITHUB_OUTPUT"
  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - id: read-outputs
        env:
          FIRST: ${{ needs.job1.outputs.output1 }}
          SECOND: ${{ needs.job1.outputs.output2 }}
        run: echo "$FIRST $SECOND"