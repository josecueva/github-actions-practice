name: Practice workflow
on: workflow_dispatch
jobs:
  open-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - run: |
          gh issue --repo ${{ github.repository }} \
            create --title "Some title here" --body "some body here"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}