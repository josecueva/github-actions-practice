name: Custom Composite action
on:
  push:
    branches: [main]
jobs:
  hello_world_jobs:
    runs-on: ubuntu-latest
    name: A job to say hello
    steps:
      - uses: actions/checkout@v6
      - id: foo
        uses: josecueva/my-first-composite-action@v1
        with:
          name: Josee
      - run: "echo My Random Number is: ${RANDOM_NUMBER}"
        shell: bash
        env:
          RANDOM_NUMBER: ${{ steps.foo.outputs.random-number }}
